# ══════════════════════════════════════════════════════════════════
# BVC Dashboard Generator — GitHub Actions Workflow
# ══════════════════════════════════════════════════════════════════
#
# Triggered hourly from 8 am–4 pm Bogotá time (13:00–21:00 UTC) and
# manually from the Actions tab (workflow_dispatch).
# Generates an interactive HTML dashboard using sura_tracker.py
# and deploys it to GitHub Pages via the official deployment API.
#
# Setup (one-time):
#   1. Push this repo to GitHub with sura_tracker.py at the root.
#   2. Go to Settings → Pages → Source: "GitHub Actions"
#   3. Run this workflow from Actions → "BVC Dashboard Generator" → Run workflow
#
# Dashboards accumulate across runs (stored on gh-pages branch).
#
# Shareable URL format:
#   https://<your-username>.github.io/<repo-name>/<SYMBOL>_<PERIOD>_<INTERVAL>.html
# ══════════════════════════════════════════════════════════════════

name: BVC Dashboard Generator

on:
  schedule:
    # Hourly, 8 am–4 pm Bogotá (UTC-5, no DST) → 13:00–21:00 UTC, every day.
    - cron: "0 13-21 * * *"
  workflow_dispatch:
    inputs:

      symbol:
        description: "BVC ticker symbol"
        required: true
        default: "GRUPOSURA"
        type: choice
        options:
          - GRUPOSURA
          - PFGRUPSURA
          - ECOPETROL
          - BANCOLOMBIA
          - BOGOTA
          - CORFICOLCF
          - PFCORFICOL
          - PFAVAL
          - GRUPOAVAL
          - DAVIVIENDA
          - OCCIDENTE
          - BBVACOL
          - GEB
          - ISA
          - CELSIA
          - PROMIGAS
          - TERPEL
          - CANACOL
          - GRUPOARGOS
          - PFGRUPOARG
          - CEMARGOS
          - PFCEMARGOS
          - NUTRESA
          - EXITO
          - MINEROS
          - CONCONCRETO
          - ENKA
          - FABRICATO
          - ETB
          - BVC
          - ELCONDOR
          - PEI

      period:
        description: "Data period  (ytd / 1mo / 3mo / 6mo / 1y / 2y / 5y / max / 4wk / 26wk …)"
        required: true
        default: "2y"
        type: choice
        options:
          - "2y"
          - "1y"
          - "6mo"
          - "3mo"
          - "1mo"
          - "ytd"
          - "5y"
          - "max"
          - "26wk"
          - "12wk"
          - "4wk"

      interval:
        description: "Candle interval"
        required: true
        default: "1d"
        type: choice
        options:
          - "1d"
          - "1wk"

      no_news:
        description: "Skip news fetching (faster run, works offline)"
        type: boolean
        default: false

# ── Permissions for official Pages deployment + gh-pages storage ──
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    name: Generate Dashboard → GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Install dependencies ────────────────────────────────
      - name: Install Python dependencies
        run: pip install --upgrade yfinance plotly pandas numpy

      # ── 4. Generate HTML dashboard ─────────────────────────────
      - name: Generate dashboard
        id: build
        env:
          INPUT_SYMBOL:   ${{ github.event.inputs.symbol   || 'GRUPOSURA' }}
          INPUT_PERIOD:   ${{ github.event.inputs.period   || '2y' }}
          INPUT_INTERVAL: ${{ github.event.inputs.interval || '1d' }}
          INPUT_NO_NEWS:  ${{ github.event.inputs.no_news  || 'false' }}
        run: |
          SYMBOL_LOWER=$(echo "$INPUT_SYMBOL" | tr '[:upper:]' '[:lower:]')
          OUTPUT="${SYMBOL_LOWER}_${INPUT_PERIOD}_${INPUT_INTERVAL}.html"

          EXTRA_ARGS=""
          [ "$INPUT_NO_NEWS" = "true" ] && EXTRA_ARGS="--no-news"

          python sura_tracker.py \
            --symbol   "$INPUT_SYMBOL"   \
            --period   "$INPUT_PERIOD"   \
            --interval "$INPUT_INTERVAL" \
            --output   "$OUTPUT"         \
            $EXTRA_ARGS

          # Always refresh the interactive all-symbols COLCAP comparison page.
          python sura_tracker.py --compare \
            --period   "$INPUT_PERIOD"   \
            --interval "$INPUT_INTERVAL" \
            --output   compare.html

          # Refresh the COLCAP alerts digest (signal scan across all symbols).
          python sura_tracker.py --alerts \
            --period   "$INPUT_PERIOD"   \
            --interval "$INPUT_INTERVAL" \
            --output   alerts.html

          echo "output_file=$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "generated_at=$(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      # ── 5. Collect all dashboards (old + new) into public/ ─────
      - name: Prepare public directory
        run: |
          mkdir -p public
          cp "${{ steps.build.outputs.output_file }}" public/
          [ -f compare.html ] && cp compare.html public/
          [ -f alerts.html ] && cp alerts.html public/

          # Fetch previous dashboards from gh-pages branch (accumulate across runs)
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            for f in $(git ls-tree --name-only origin/gh-pages | grep '\.html$' | grep -v '^index'); do
              # Don't overwrite the freshly generated file
              [ ! -f "public/$f" ] && git show "origin/gh-pages:$f" > "public/$f" 2>/dev/null || true
            done
          fi

          # Build index page listing all dashboards
          ALL_FILES=$(ls public/*.html 2>/dev/null | xargs -n1 basename | grep -v '^index' | grep -v '^compare' | grep -v '^alerts' | sort -u)

          # Featured links (only if the pages exist)
          FEATURED=""
          [ -f public/compare.html ] && FEATURED="${FEATURED}"'<a class="featured" href="compare.html">📊 COLCAP Compare — all symbols side by side</a>'
          [ -f public/alerts.html ] && FEATURED="${FEATURED}"'<a class="featured" href="alerts.html">🔔 COLCAP Alerts — signal scan</a>'

          ITEMS=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            LABEL=$(echo "$f" | sed 's/_/ /g; s/\.html//')
            ITEMS="${ITEMS}<li><a href=\"${f}\">${LABEL}</a></li>\n"
          done <<< "$ALL_FILES"

          cat > public/index.html <<INDEXEOF
          <!DOCTYPE html><html lang="en"><head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>BVC Dashboards</title>
          <style>
            body{font-family:system-ui,sans-serif;background:#0d1117;color:#e6edf3;padding:40px 24px;max-width:700px;margin:0 auto;}
            h1{font-size:24px;margin-bottom:4px;}
            p{color:#8b949e;font-size:14px;margin-bottom:28px;}
            ul{list-style:none;padding:0;display:flex;flex-direction:column;gap:10px;}
            li a{display:block;background:#161b22;border:1px solid #30363d;border-radius:8px;
                  padding:14px 18px;color:#58a6ff;text-decoration:none;font-weight:600;
                  text-transform:capitalize;transition:border-color .2s;}
            li a:hover{border-color:#58a6ff;}
            .featured{display:block;background:#58a6ff;color:#000;border-radius:8px;
                  padding:16px 18px;font-weight:700;text-decoration:none;margin-bottom:24px;}
            .featured:hover{background:#79b8ff;}
            footer{margin-top:40px;font-size:11px;color:#8b949e;}
          </style>
          </head><body>
          <h1>📈 BVC Dashboards</h1>
          <p>Generated by <code>sura_tracker.py</code> via GitHub Actions. Click a dashboard to open it.</p>
          $(printf "$FEATURED")
          <ul>$(printf "$ITEMS")</ul>
          <footer>Last updated: ${{ steps.build.outputs.generated_at }}</footer>
          </body></html>
          INDEXEOF

      # ── 6. Persist dashboards to gh-pages branch for next run ──
      - name: Update gh-pages storage branch
        run: |
          cd public
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add .
          git commit -m "📊 ${{ github.event.inputs.symbol }} · ${{ github.event.inputs.period }} · ${{ github.event.inputs.interval }} · ${{ steps.build.outputs.generated_at }}"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages

      # ── 7. Configure GitHub Pages ──────────────────────────────
      - name: Configure Pages
        uses: actions/configure-pages@v5

      # ── 8. Upload Pages artifact ───────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      # ── 9. Deploy to GitHub Pages ──────────────────────────────
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ── 10. Print URL + write job summary ──────────────────────
      - name: Print shareable URL
        run: |
          FILE="${{ steps.build.outputs.output_file }}"
          BASE_URL="${{ steps.deployment.outputs.page_url }}"
          BASE_URL="${BASE_URL%/}"
          DASH_URL="${BASE_URL}/${FILE}"
          INDEX_URL="${BASE_URL}/index.html"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅  Dashboard ready!"
          echo ""
          echo "  Dashboard : ${DASH_URL}"
          echo "  Index     : ${INDEX_URL}"
          echo ""
          echo "  ⏳  GitHub Pages may take ~30 s to serve the new file."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          {
            echo "## ✅ BVC Dashboard Generated"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Symbol** | \`${{ github.event.inputs.symbol }}\` |"
            echo "| **Period** | \`${{ github.event.inputs.period }}\` |"
            echo "| **Interval** | \`${{ github.event.inputs.interval }}\` |"
            echo "| **Generated** | ${{ steps.build.outputs.generated_at }} |"
            echo "| **File** | \`${FILE}\` |"
            echo ""
            echo "---"
            echo ""
            echo "### 🔗 Share this link"
            echo ""
            echo "**[${DASH_URL}](${DASH_URL})**"
            echo ""
            echo "---"
            echo ""
            echo "📋 **[Dashboard Index](${INDEX_URL})** — all generated dashboards"
            echo ""
            echo "> ⏳ GitHub Pages may take ~30 seconds to serve the new file after this run."
          } >> "$GITHUB_STEP_SUMMARY"